<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Position Calc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .super-input { 
            background-color: #ffffff !important;
            color: #000000 !important;
            font-weight: 800 !important;
            border-radius: 0.5rem;
            padding: 0.75rem;
            width: 100%;
            font-size: 1.25rem; 
            border: 2px solid transparent;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            text-transform: uppercase;
        }
        .super-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5);
        }
        .super-input::placeholder {
            color: #d1d5db !important;
            font-weight: 600;
            text-transform: none;
        }
        .trigger-input {
            font-size: 0.875rem;
            padding: 0.5rem;
            background-color: #1e293b !important;
            color: #ffffff !important;
            font-weight: 700 !important;
            border: 1px solid #374151 !important;
        }
        .trigger-input::placeholder {
            color: #6b7280 !important;
            font-weight: 500 !important;
        }
        .risk-input {
            font-size: 1.5rem;
            padding-left: 2.5rem;
            text-align: left;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        .trigger-met {
            border: 2px solid #10b981 !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4) !important;
        }
        .trigger-met-short {
            border: 2px solid #ef4444 !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4) !important;
        }
        .not-triggered {
            opacity: 0.4;
            filter: grayscale(50%);
        }
        .api-selector {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .ws-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 9999px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="min-h-screen p-4 text-gray-100 flex flex-col items-center">

    <div class="glass-card rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden ring-1 ring-white/10 mb-8">
        <div class="bg-slate-900/50 p-6 border-b border-white/10 text-center">
            <h1 class="text-2xl font-black tracking-tight text-white uppercase">Position Size Calculator</h1>
            <p class="text-blue-400 text-xs font-bold tracking-widest uppercase mt-1">Multi-Ticker • Real-Time Data • Smart Triggers</p>
        </div>

        <div class="p-4 bg-blue-900/10 border-b border-blue-500/20">
            <div class="flex flex-col gap-2">
                <label class="font-bold text-blue-200 text-sm">Select Data Provider:</label>
                <select id="apiProvider" class="bg-slate-800 text-white border border-slate-600 rounded px-3 py-2 focus:outline-none focus:border-blue-500 font-bold">
                    <option value="finnhub">Finnhub (REST)</option>
                    <option value="twelvedata">Twelve Data (REST)</option>
                    <option value="stockdata">StockData.org (REST)</option>
                    <option value="realtimefinance">RealtimeFinance (WebSocket)</option>
                </select>
                <div id="apiKeySection" class="mt-2">
                    <div class="flex gap-2">
                        <input type="password" id="apiKeyInput" placeholder="Enter API Key (if required)" class="w-full bg-slate-800 text-white border border-slate-600 rounded px-3 py-2 focus:outline-none focus:border-blue-500">
                        <button onclick="saveKey()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold transition-colors whitespace-nowrap">SAVE</button>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-2" id="apiInfo">
                        Finnhub: <a href="https://finnhub.io" target="_blank" class="text-blue-400 underline">finnhub.io</a>
                    </p>
                    <p id="wsStatus" class="text-[10px] text-emerald-400 mt-1 hidden">
                        <span class="ws-badge bg-emerald-900/70 text-emerald-300 border border-emerald-500/40">WebSocket LIVE</span>
                        Prices auto-update from RealtimeFinance.io
                    </p>
                </div>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Risk Per Trade ($)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-800 font-extrabold text-xl z-10 pointer-events-none">$</span>
                    <input type="number" id="riskValue" class="super-input risk-input" placeholder="Example: 500" value="950">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Enter Tickers & Trigger Prices (Up to 5)</label>
                <p class="text-[10px] text-gray-500 ml-1">LONG: Stock UP on day + above trigger | SHORT: Stock DOWN on day + below trigger</p>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                    <div class="flex flex-col gap-2">
                        <input type="text" class="super-input ticker-input" placeholder="Ticker">
                        <input type="number" step="0.01" class="trigger-input" placeholder="Trigger $">
                    </div>
                    <div class="flex flex-col gap-2">
                        <input type="text" class="super-input ticker-input" placeholder="Ticker">
                        <input type="number" step="0.01" class="trigger-input" placeholder="Trigger $">
                    </div>
                    <div class="flex flex-col gap-2">
                        <input type="text" class="super-input ticker-input" placeholder="Ticker">
                        <input type="number" step="0.01" class="trigger-input" placeholder="Trigger $">
                    </div>
                    <div class="flex flex-col gap-2">
                        <input type="text" class="super-input ticker-input" placeholder="Ticker">
                        <input type="number" step="0.01" class="trigger-input" placeholder="Trigger $">
                    </div>
                    <div class="flex flex-col gap-2">
                        <input type="text" class="super-input ticker-input" placeholder="Ticker">
                        <input type="number" step="0.01" class="trigger-input" placeholder="Trigger $">
                    </div>
                </div>
            </div>

            <button onclick="calculateAll()" id="calcBtn" class="w-full bg-gradient-to-br from-green-500 to-green-600 hover:from-green-400 hover:to-green-500 text-white px-6 py-4 rounded-xl font-black text-2xl shadow-lg shadow-green-900/50 transition-all active:scale-95">
                CALCULATE ALL
            </button>
            
            <p id="errorMsg" class="text-red-400 font-bold text-sm text-center bg-red-900/20 py-2 rounded hidden"></p>
        </div>
    </div>

    <div id="resultsContainer" class="w-full max-w-2xl space-y-6 pb-12"></div>

    <script>
        // API Configuration
        const API_CONFIGS = {
            finnhub: {
                name: 'Finnhub',
                infoUrl: 'https://finnhub.io',
                storageKey: 'finnhub_key',
                needsKey: true,
                type: 'rest'
            },
            twelvedata: {
                name: 'Twelve Data',
                infoUrl: 'https://twelvedata.com',
                storageKey: 'twelvedata_key',
                needsKey: true,
                type: 'rest'
            },
            stockdata: {
                name: 'StockData.org',
                infoUrl: 'https://www.stockdata.org',
                storageKey: 'stockdata_key',
                needsKey: true,
                type: 'rest'
            },
            realtimefinance: {
                name: 'RealtimeFinance.io',
                infoUrl: 'https://realtimefinance.io',
                storageKey: null,
                needsKey: false,
                type: 'websocket'
            }
        };

        let ws = null;
        let wsSubscribedSymbols = new Set();
        let latestWsQuotes = {}; // symbol -> {price, high, low, prevClose}

        // Update API info when provider changes
        document.getElementById('apiProvider').addEventListener('change', (e) => {
            const providerKey = e.target.value;
            const config = API_CONFIGS[providerKey];
            const apiInfo = document.getElementById('apiInfo');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const wsStatus = document.getElementById('wsStatus');

            if (config.type === 'rest') {
                apiInfo.innerHTML = `${config.name}: <a href="${config.infoUrl}" target="_blank" class="text-blue-400 underline">${config.infoUrl}</a>`;
                apiKeyInput.disabled = !config.needsKey;
                if (config.storageKey) {
                    const savedKey = localStorage.getItem(config.storageKey) || '';
                    apiKeyInput.value = savedKey;
                } else {
                    apiKeyInput.value = '';
                }
                wsStatus.classList.add('hidden');
                disconnectRealtimeFinance();
            } else if (providerKey === 'realtimefinance') {
                apiInfo.innerHTML = `RealtimeFinance.io: <a href="${config.infoUrl}" target="_blank" class="text-blue-400 underline">${config.infoUrl}</a> (No API key required)`;
                apiKeyInput.value = '';
                apiKeyInput.disabled = true;
                wsStatus.classList.remove('hidden');
                // WebSocket connection will be created when Calculate is pressed
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const provider = document.getElementById('apiProvider').value;
            const cfg = API_CONFIGS[provider];
            if (cfg.type === 'rest' && cfg.storageKey) {
                const savedKey = localStorage.getItem(cfg.storageKey);
                if (savedKey) {
                    document.getElementById('apiKeyInput').value = savedKey;
                }
            }
        });

        function saveKey() {
            const provider = document.getElementById('apiProvider').value;
            const config = API_CONFIGS[provider];
            const key = document.getElementById('apiKeyInput').value.trim();
            if (config.storageKey && key) {
                localStorage.setItem(config.storageKey, key);
                showSuccess('API Key saved successfully!');
            }
        }

        function showSuccess(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden', 'bg-red-900/20', 'text-red-400');
            errorMsg.classList.add('bg-green-900/20', 'text-green-400');
            setTimeout(() => errorMsg.classList.add('hidden'), 3000);
        }

        // REST FETCHERS

        async function fetchTwelveData(ticker, apiKey) {
            const quoteUrl = `https://api.twelvedata.com/quote?symbol=${encodeURIComponent(ticker)}&apikey=${apiKey}`;
            const res = await fetch(quoteUrl);
            if (res.status === 429) throw new Error("Rate Limit");
            const quote = await res.json();
            if (quote.code || quote.status === 'error') throw new Error("Invalid Ticker");
            return {
                c: parseFloat(quote.close),
                h: parseFloat(quote.high),
                l: parseFloat(quote.low),
                pc: parseFloat(quote.previous_close)
            };
        }

        async function fetchFinnhub(ticker, apiKey) {
            const quoteUrl = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker)}&token=${apiKey}`;
            const res = await fetch(quoteUrl);
            if (res.status === 429) throw new Error("Rate Limit");
            const data = await res.json();
            if (!data || (data.c === 0 && data.d === null)) throw new Error("Invalid Ticker");
            return {
                c: data.c,
                h: data.h || data.c,
                l: data.l || data.c,
                pc: data.pc
            };
        }

        async function fetchStockDataOrg(ticker, apiKey) {
            const url = `https://api.stockdata.org/v1/data/quote?symbols=${encodeURIComponent(ticker)}&api_token=${apiKey}`;
            const res = await fetch(url);
            if (res.status === 429) throw new Error("Rate Limit");
            if (!res.ok) throw new Error("HTTP " + res.status);
            const json = await res.json();
            if (!json.data || !json.data.length) throw new Error("Invalid Ticker");

            const d = json.data[0]; // StockData.org structure [web:96]
            // It exposes price, day_high, day_low, previous_close_price. [web:96]
            return {
                c: Number(d.price),
                h: Number(d.day_high ?? d.price),
                l: Number(d.day_low ?? d.price),
                pc: Number(d.previous_close_price ?? d.price)
            };
        }

        async function fetchTickerData(ticker, provider, apiKey) {
            switch(provider) {
                case 'twelvedata':
                    return await fetchTwelveData(ticker, apiKey);
                case 'finnhub':
                    return await fetchFinnhub(ticker, apiKey);
                case 'stockdata':
                    return await fetchStockDataOrg(ticker, apiKey);
                default:
                    throw new Error("Unknown provider");
            }
        }

        // WEBSOCKET: REALTIME FINANCE (unofficial public WS) [web:83]

        function connectRealtimeFinance(symbols) {
            disconnectRealtimeFinance();
            wsSubscribedSymbols = new Set(symbols.map(s => s.toUpperCase()));
            latestWsQuotes = {};

            if (wsSubscribedSymbols.size === 0) return;

            try {
                ws = new WebSocket("wss://ws.realtimefinance.io"); // base from project docs [web:83]
            } catch (e) {
                console.error(e);
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.innerText = "Could not open RealtimeFinance WebSocket.";
                errorMsg.classList.remove('hidden', 'bg-green-900/20', 'text-green-400');
                errorMsg.classList.add('bg-red-900/20', 'text-red-400');
                return;
            }

            ws.onopen = () => {
                // Project subscribes by sending JSON with symbols array; check repo for exact format. [web:83]
                const payload = {
                    symbols: Array.from(wsSubscribedSymbols)
                };
                ws.send(JSON.stringify(payload));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    // Example from docs: { price, volume, time, symbol, market } [web:83]
                    if (!data || !data.symbol || data.price == null) return;
                    const sym = String(data.symbol).toUpperCase();
                    if (!wsSubscribedSymbols.has(sym)) return;

                    // We don't get high/low/prevClose from this API, so approximate:
                    const prevQuote = latestWsQuotes[sym];
                    const price = Number(data.price);

                    const high = prevQuote ? Math.max(prevQuote.h, price) : price;
                    const low = prevQuote ? Math.min(prevQuote.l, price) : price;
                    const pc = prevQuote ? prevQuote.pc : price; // fallback

                    latestWsQuotes[sym] = {
                        c: price,
                        h: high,
                        l: low,
                        pc: pc
                    };

                    // Update the card in place if it exists
                    const container = document.getElementById('resultsContainer');
                    const card = container.querySelector(`[data-ticker="${sym}"]`);
                    if (card) {
                        const riskAmount = parseFloat(document.getElementById('riskValue').value) || 0;
                        const triggerInputs = Array.from(document.querySelectorAll('.ticker-input')).map((el, idx) => {
                            const trigVal = parseFloat(document.querySelectorAll('.trigger-input')[idx].value) || null;
                            return { ticker: el.value.trim().toUpperCase(), trigger: trigVal };
                        });
                        const trigObj = triggerInputs.find(t => t.ticker === sym);
                        const triggerPrice = trigObj ? trigObj.trigger : null;

                        // Rebuild card inner content
                        const html = buildResultCardHTML(sym, latestWsQuotes[sym], riskAmount, triggerPrice);
                        card.innerHTML = html;
                    }
                } catch (err) {
                    console.error("WS message error", err);
                }
            };

            ws.onerror = (e) => {
                console.error("WebSocket error", e);
            };

            ws.onclose = () => {
                // No auto-reconnect for now to keep it simple
            };
        }

        function disconnectRealtimeFinance() {
            if (ws) {
                try { ws.close(); } catch(e) {}
            }
            ws = null;
            wsSubscribedSymbols = new Set();
            latestWsQuotes = {};
        }

        async function calculateAll() {
            const riskVal = parseFloat(document.getElementById('riskValue').value);
            const tickerInputs = Array.from(document.querySelectorAll('.ticker-input'));
            const triggerInputs = Array.from(document.querySelectorAll('.trigger-input'));
            
            const tickerData = tickerInputs.map((input, index) => ({
                ticker: input.value.trim().toUpperCase(),
                trigger: parseFloat(triggerInputs[index].value) || null
            })).filter(item => item.ticker !== "");
            
            const provider = document.getElementById('apiProvider').value;
            
            const btn = document.getElementById('calcBtn');
            const container = document.getElementById('resultsContainer');
            const errorMsg = document.getElementById('errorMsg');
            const cfg = API_CONFIGS[provider];

            if (tickerData.length === 0) {
                errorMsg.innerText = "Enter at least one ticker.";
                errorMsg.classList.remove('hidden', 'bg-green-900/20', 'text-green-400');
                errorMsg.classList.add('bg-red-900/20', 'text-red-400');
                return;
            }

            errorMsg.classList.add('hidden');
            container.innerHTML = ''; 
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '<span class="animate-pulse">⚡ FETCHING DATA...</span>';
            
            const startTime = performance.now();

            try {
                if (cfg.type === 'websocket' && provider === 'realtimefinance') {
                    // WebSocket mode: connect and build initial skeleton cards
                    const symbols = tickerData.map(t => t.ticker);
                    connectRealtimeFinance(symbols);

                    tickerData.forEach(item => {
                        const dummy = { c: 0, h: 0, l: 0, pc: 0 };
                        createResultCard(item.ticker, dummy, riskVal, item.trigger, container, true);
                    });

                    const endTime = performance.now();
                    const fetchTime = ((endTime - startTime) / 1000).toFixed(2);
                    const perfDiv = document.createElement('div');
                    perfDiv.className = 'text-center text-emerald-400 text-sm font-bold bg-emerald-900/20 py-2 rounded-lg';
                    perfDiv.innerHTML = `⚡ Subscribed ${tickerData.length} ticker(s) to RealtimeFinance WebSocket in ${fetchTime}s`;
                    container.appendChild(perfDiv);
                } else {
                    const apiKey = cfg.needsKey && cfg.storageKey ? localStorage.getItem(cfg.storageKey) : null;
                    if (cfg.needsKey && !apiKey) {
                        errorMsg.innerText = "Please enter and save your API Key above.";
                        errorMsg.classList.remove('hidden', 'bg-green-900/20', 'text-green-400');
                        errorMsg.classList.add('bg-red-900/20', 'text-red-400');
                        btn.innerHTML = originalBtnText;
                        return;
                    }

                    const fetchPromises = tickerData.map(item => 
                        fetchTickerData(item.ticker, provider, apiKey)
                            .then(data => ({ ticker: item.ticker, trigger: item.trigger, data, success: true }))
                            .catch(err => ({ ticker: item.ticker, trigger: item.trigger, error: err.message, success: false }))
                    );

                    const results = await Promise.all(fetchPromises);
                    const endTime = performance.now();
                    const fetchTime = ((endTime - startTime) / 1000).toFixed(2);

                    results.forEach(result => {
                        if (result.success) {
                            createResultCard(result.ticker, result.data, riskVal, result.trigger, container);
                        } else {
                            createErrorCard(result.ticker, result.error, container);
                        }
                    });

                    const perfDiv = document.createElement('div');
                    perfDiv.className = 'text-center text-green-400 text-sm font-bold bg-green-900/20 py-2 rounded-lg';
                    perfDiv.innerHTML = `⚡ Fetched ${results.length} ticker(s) in ${fetchTime}s via ${cfg.name}`;
                    container.appendChild(perfDiv);
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Error: " + err.message;
                errorMsg.classList.remove('hidden', 'bg-green-900/20', 'text-green-400');
                errorMsg.classList.add('bg-red-900/20', 'text-red-400');
            } finally {
                btn.innerHTML = originalBtnText;
            }
        }

        function buildResultCardHTML(ticker, data, riskAmount, triggerPrice) {
            const { c: current, h: high, l: low, pc: prevClose } = data;

            const longStopPrice = low - 0.01;
            const shortStopPrice = high + 0.01;

            const riskPerShareLong = current - longStopPrice;
            let sharesLong = 0;
            if (riskPerShareLong > 0 && Number.isFinite(riskPerShareLong)) {
                sharesLong = Math.floor(riskAmount / riskPerShareLong);
            } else {
                sharesLong = "N/A";
            }

            const riskPerShareShort = shortStopPrice - current;
            let sharesShort = 0;
            if (riskPerShareShort > 0 && Number.isFinite(riskPerShareShort)) {
                sharesShort = Math.floor(riskAmount / riskPerShareShort);
            } else {
                sharesShort = "N/A";
            }

            const isUpDay = current > prevClose;
            const isDownDay = current < prevClose;
            const changePercent = prevClose ? ((current - prevClose) / prevClose * 100).toFixed(2) : "0.00";
            const changeColor = isUpDay ? 'text-green-400' : 'text-red-400';
            const changeSymbol = isUpDay ? '▲' : '▼';

            let longTriggerMet = false;
            let shortTriggerMet = false;
            let triggerDisplay = '';
            let notTriggered = false;

            if (triggerPrice !== null && !isNaN(triggerPrice)) {
                if (isUpDay && current > triggerPrice) {
                    longTriggerMet = true;
                    triggerDisplay = `<div class="text-center mt-2 text-green-400 text-xs font-bold">✓ LONG TRIGGER MET (Above $${triggerPrice.toFixed(2)})</div>`;
                } else if (isDownDay && current < triggerPrice) {
                    shortTriggerMet = true;
                    triggerDisplay = `<div class="text-center mt-2 text-red-400 text-xs font-bold">✓ SHORT TRIGGER MET (Below $${triggerPrice.toFixed(2)})</div>`;
                } else {
                    notTriggered = true;
                    if (isUpDay) {
                        triggerDisplay = `<div class="text-center mt-2 text-gray-500 text-xs font-bold">⚠ LONG Trigger Not Met (Need >${triggerPrice.toFixed(2)}, at ${current.toFixed(2)})</div>`;
                    } else if (isDownDay) {
                        triggerDisplay = `<div class="text-center mt-2 text-gray-500 text-xs font-bold">⚠ SHORT Trigger Not Met (Need <${triggerPrice.toFixed(2)}, at ${current.toFixed(2)})</div>`;
                    } else {
                        triggerDisplay = `<div class="text-center mt-2 text-yellow-400 text-xs font-bold">⚠ Flat on Day (Trigger: ${triggerPrice.toFixed(2)})</div>`;
                    }
                }
            }

            const longClasses = longTriggerMet ? 'trigger-met' : (shortTriggerMet || notTriggered ? 'not-triggered' : '');
            const shortClasses = shortTriggerMet ? 'trigger-met-short' : (longTriggerMet || notTriggered ? 'not-triggered' : '');
            const longBadge = longTriggerMet ? '<div class="absolute top-2 right-2 bg-green-500 text-white text-[10px] font-black px-2 py-1 rounded-full z-20">✓</div>' : '';
            const shortBadge = shortTriggerMet ? '<div class="absolute top-2 right-2 bg-red-500 text-white text-[10px] font-black px-2 py-1 rounded-full z-20">✓</div>' : '';

            return `
                <div class="flex justify-between items-start border-b border-white/10 pb-3 mb-4">
                    <div>
                        <h2 class="text-3xl font-black text-white tracking-tight">${ticker}</h2>
                        <div class="text-gray-400 text-xs font-bold mt-1">RISK: $${riskAmount.toLocaleString()}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-bold text-blue-400">$${Number.isFinite(current) ? current.toFixed(2) : '0.00'}</div>
                        <div class="text-[10px] ${changeColor} font-mono mt-1 font-bold">
                            ${changeSymbol} ${Math.abs(changePercent)}%
                        </div>
                        <div class="text-[10px] text-gray-500 font-mono">
                            H: <span class="text-gray-300">${Number.isFinite(high) ? high.toFixed(2) : '0.00'}</span> / L: <span class="text-gray-300">${Number.isFinite(low) ? low.toFixed(2) : '0.00'}</span>
                        </div>
                    </div>
                </div>
                ${triggerDisplay}
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div class="bg-emerald-900/20 border border-emerald-500/20 rounded-lg p-3 text-center group hover:bg-emerald-900/30 transition-colors relative ${longClasses}">
                        ${longBadge}
                        <div class="text-emerald-500 text-[10px] font-black uppercase tracking-widest mb-1">LONG SETUP</div>
                        <div class="text-3xl font-black text-white font-mono">${typeof sharesLong === 'number' ? sharesLong.toLocaleString() : sharesLong}</div>
                        <div class="text-[10px] text-emerald-200/50 uppercase font-bold tracking-wider mb-2">Shares</div>
                        <div class="bg-slate-900/50 rounded py-1 px-2 inline-block border border-white/5">
                            <span class="text-gray-500 text-[10px] font-bold mr-1">STOP:</span>
                            <span class="text-emerald-400 font-mono font-bold text-sm">${Number.isFinite(longStopPrice) ? longStopPrice.toFixed(2) : '0.00'}</span>
                        </div>
                    </div>
                    <div class="bg-rose-900/20 border border-rose-500/20 rounded-lg p-3 text-center group hover:bg-rose-900/30 transition-colors relative ${shortClasses}">
                        ${shortBadge}
                        <div class="text-rose-500 text-[10px] font-black uppercase tracking-widest mb-1">SHORT SETUP</div>
                        <div class="text-3xl font-black text-white font-mono">${typeof sharesShort === 'number' ? sharesShort.toLocaleString() : sharesShort}</div>
                        <div class="text-[10px] text-rose-200/50 uppercase font-bold tracking-wider mb-2">Shares</div>
                        <div class="bg-slate-900/50 rounded py-1 px-2 inline-block border border-white/5">
                            <span class="text-gray-500 text-[10px] font-bold mr-1">STOP:</span>
                            <span class="text-rose-400 font-mono font-bold text-sm">${Number.isFinite(shortStopPrice) ? shortStopPrice.toFixed(2) : '0.00'}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function createResultCard(ticker, data, riskAmount, triggerPrice, container, wsMode=false) {
            const card = document.createElement('div');
            card.className = 'glass-card rounded-xl p-5 animate-fade-in ring-1 ring-white/10';
            card.setAttribute('data-ticker', ticker.toUpperCase());
            card.innerHTML = buildResultCardHTML(ticker, data, riskAmount, triggerPrice);
            container.appendChild(card);
        }

        function createErrorCard(ticker, error, container) {
            const cardHTML = `
                <div class="bg-red-900/20 border border-red-500/30 rounded-xl p-4 animate-fade-in flex justify-between items-center">
                    <div>
                        <h2 class="text-xl font-black text-red-400 tracking-tight">${ticker}</h2>
                        <p class="text-xs text-red-300 mt-1">Fetch Error</p>
                    </div>
                    <div class="text-xs bg-red-900/50 px-3 py-1 rounded text-red-200 border border-red-500/20">
                        ${error}
                    </div>
                </div>
            `;
            const div = document.createElement('div');
            div.innerHTML = cardHTML;
            container.appendChild(div);
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keydown', (e) => {
                if(e.key === 'Enter') calculateAll();
            });
        });
    </script>
</body>
</html>
